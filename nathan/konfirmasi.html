<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konfirmasi - Markeet.my</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green-dark:#1f5c3f;
    --green:#2e8b4f;
    --green-light:#4caf6e;
    --white:#ffffff;
    --gray-text:#6b7280;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
  }

  html,body{
    height:100%;
    width:100%;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    background:linear-gradient(160deg, var(--green-dark) 0%, var(--green) 55%, var(--green-light) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    user-select:none;
  }

  /* dekorasi bulat transparan seperti aksen di UI asal */
  .decor{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .decor.c1{ width:340px; height:340px; top:-120px; left:-100px; }
  .decor.c2{ width:220px; height:220px; bottom:-80px; right:-60px; }
  .decor.c3{ width:140px; height:140px; bottom:60px; left:40px; background:rgba(255,255,255,0.05);}

  .card{
    background:var(--white);
    border-radius:20px;
    padding:48px 40px 40px;
    width:90%;
    max-width:380px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    position:relative;
    animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes pop{
    0%{ transform:scale(.85); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }

  .check-circle{
    width:84px;
    height:84px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--green-light), var(--green));
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 22px;
    box-shadow:0 8px 20px rgba(46,139,79,0.35);
    animation: bounceIn .6s .1s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes bounceIn{
    0%{ transform:scale(0); }
    100%{ transform:scale(1); }
  }

  .check-circle svg{
    width:40px;
    height:40px;
  }

  .check-circle path{
    stroke:#fff;
    stroke-width:3;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:48;
    stroke-dashoffset:48;
    animation: draw .5s .4s ease forwards;
  }

  @keyframes draw{
    to{ stroke-dashoffset:0; }
  }

  h1{
    color:#1a1a1a;
    font-size:22px;
    font-weight:700;
    margin-bottom:10px;
  }

  p.desc{
    color:var(--gray-text);
    font-size:14px;
    line-height:1.6;
    margin-bottom:26px;
  }

  .summary{
    background:#f4f7f5;
    border-radius:14px;
    padding:16px 18px;
    text-align:left;
    margin-bottom:26px;
  }

  .summary-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:var(--gray-text);
    padding:4px 0;
  }

  .summary-row.total{
    border-top:1px dashed #d7ded9;
    margin-top:8px;
    padding-top:10px;
    font-weight:700;
    color:#1a1a1a;
    font-size:14px;
  }

  .summary-row span:last-child{
    font-weight:600;
    color:#1a1a1a;
  }

  .tap-hint{
    font-size:12px;
    color:#9aa3a0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin-top:4px;
    animation: fade 1.8s ease-in-out infinite;
  }

  @keyframes fade{
    0%,100%{ opacity:.4; }
    50%{ opacity:1; }
  }

  .tap-hint svg{
    width:14px;
    height:14px;
  }

  .brand{
    position:absolute;
    top:24px;
    left:0;
    right:0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    color:rgba(255,255,255,0.85);
    font-weight:600;
    font-size:14px;
    letter-spacing:.3px;
  }

  .brand-icon{
    width:26px;
    height:26px;
    border-radius:8px;
    background:rgba(255,255,255,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
  }
</style>
</head>
<body onclick="goHome()">

  <div class="decor c1"></div>
  <div class="decor c2"></div>
  <div class="decor c3"></div>

  <div class="brand">
    <div class="brand-icon">🛍️</div>
    Markeet.my
  </div>

  <div class="card">
    <div class="check-circle">
      <svg viewBox="0 0 24 24">
        <path d="M4 12.5 L10 18 L20 6" />
      </svg>
    </div>

    <h1>Terima Kasih Sudah Belanja!</h1>
    <p class="desc">
      Pesanan kamu sudah kami terima dan sedang diproses.
      Kami akan mengirimkan notifikasi begitu pesanan dikirim.
    </p>

    <div class="summary">
      <div class="summary-row">
        <span>Total Produk</span>
        <span>3 produk</span>
      </div>
      <div class="summary-row">
        <span>Metode Pembayaran</span>
        <span>QRIS</span>
      </div>
      <div class="summary-row total">
        <span>Total Bayar</span>
        <span>Rp. 190.294</span>
      </div>
    </div>

    <div class="tap-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11.5V6a2 2 0 1 1 4 0v5.5"/>
        <path d="M13 11.5V4a2 2 0 1 1 4 0v9"/>
        <path d="M17 12V9a2 2 0 1 1 4 0v7c0 3.3-2.7 6-6 6h-2c-2.2 0-3.5-.6-4.8-2.1L4 14.8c-.6-.7-.5-1.7.2-2.2.6-.5 1.5-.4 2 .1L9 15"/>
      </svg>
      Ketuk layar untuk kembali ke Home
    </div>
  </div>

<script>
  function goHome(){
    window.location.href = "home.html";
  }
</script>

</body>
</html>
