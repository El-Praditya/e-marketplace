<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Markeet.my</title>
<style>
  :root{
    --color-primary: #3F7D4D;
    --color-primary-dark: #2F5F3A;
    --color-primary-light: #E8F3EA;
    --color-text: #1F2A24;
    --color-text-muted: #6B7A72;
    --color-border: #E1E6E3;
    --color-bg: #F0F2F0;
    --color-white: #FFFFFF;
    --radius-md: 10px;
    --radius-lg: 20px;
    --shadow-card: 0 10px 30px rgba(31, 42, 36, 0.08);
    --font-base: "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    font-family: var(--font-base);
    background: var(--color-bg);
    color: var(--color-text);
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
  }

  .login-card{
    width: 100%;
    max-width: 380px;
    background: var(--color-white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 40px 32px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .brand-icon{
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }

  .brand-icon svg{ width: 24px; height: 24px; }

  .brand-name{
    font-size: 19px;
    font-weight: 700;
    color: var(--color-text);
  }

  .heading{
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .subheading{
    font-size: 14px;
    color: var(--color-text-muted);
    margin-bottom: 28px;
  }

  .field{
    margin-bottom: 18px;
  }

  .field label{
    display:block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--color-text);
  }

  .field input{
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border);
    background: #FAFBFA;
    font-size: 14px;
    font-family: inherit;
    color: var(--color-text);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  .field input::placeholder{ color: #9AA5A0; }

  .field input:focus{
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-light);
  }

  .row-between{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin: 4px 0 24px;
    font-size: 13px;
  }

  .remember-me{
    display:flex;
    align-items:center;
    gap: 8px;
    color: var(--color-text-muted);
  }

  .remember-me input{
    width: 16px;
    height: 16px;
    accent-color: var(--color-primary);
    cursor: pointer;
  }

  .link{
    color: var(--color-primary);
    text-decoration: none;
    font-weight: 600;
  }

  .link:hover{ text-decoration: underline; }

  .btn-primary{
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--color-primary);
    color: var(--color-white);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background .15s ease;
  }

  .btn-primary:hover{ background: var(--color-primary-dark); }

  .divider{
    display:flex;
    align-items:center;
    gap: 12px;
    margin: 24px 0;
    color: var(--color-text-muted);
    font-size: 13px;
  }

  .divider::before, .divider::after{
    content:"";
    flex:1;
    height: 1px;
    background: var(--color-border);
  }

  .btn-social{
    width: 100%;
    padding: 11px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border);
    background: var(--color-white);
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text);
    cursor: pointer;
    margin-bottom: 12px;
    transition: background .15s ease, border-color .15s ease;
  }

  .btn-social:hover{ background: #F7F8F7; border-color: #C9D2CC; }

  .btn-social svg{ width: 18px; height: 18px; flex-shrink:0; }

  .footer-text{
    text-align:center;
    font-size: 13px;
    color: var(--color-text-muted);
    margin-top: 20px;
  }
</style>
</head>
<body>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 8L7 4H17L18 8" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 8H20L19 20H5L4 8Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
          <circle cx="10" cy="12" r="1.1" fill="white"/>
          <circle cx="14" cy="12" r="1.1" fill="white"/>
        </svg>
      </div>
      <div class="brand-name">Markeet.my</div>
    </div>

    <h1 class="heading">Hallo!</h1>
    <p class="subheading">Belanja kebutuhan lebih murah</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="contoh@gmail.com" required>
      </div>

      <div class="field">
        <label for="password">Kata sandi</label>
        <input type="password" id="password" name="password" placeholder="Masukan kata sandi" required>
      </div>

      <div class="row-between">
        <label class="remember-me">
          <input type="checkbox" name="remember">
          Ingat saya
        </label>
        <a href="/lupa-kata-sandi" class="link">Lupa kata sandi?</a>
      </div>

      <button type="submit" class="btn-primary">MASUK</button>
    </form>

    <div class="divider">atau</div>

    <!-- google --> 
    <button type="button" class="btn-social" onclick="window.location.href='home.html'">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4C29.6 35.4 26.9 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.6 5.1C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.6 5.4C41.9 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
      Login dengan Google
    </button>
 <!-- fesnuk -->
    <button type="button" class="btn-social" onclick="window.location.href='home.html'">
      <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.07C24 5.4 18.6 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.09 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.7 4.53-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.89v2.26h3.32l-.53 3.49h-2.79V24C19.61 23.09 24 18.1 24 12.07z"/></svg>
     Login dengan Facebook
    </button>


    <p class="footer-text">
      Belum punya akun? <a href="register.html" class="link">Daftar sekarang</a>
    </p>
  </div>

<!-- masuk - lemparan -->

  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    // TODO: sambungkan ke proses autentikasi
    window.location.href = 'home.html';
  });
</script>>


</body>
</html>
