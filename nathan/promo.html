<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kupon - Markeet.my</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* ===== Design tokens (shared across pages) ===== */
    --color-primary-green: #3F7D4D;
    --color-primary-green-dark: #336640;
    --color-primary-green-light: #E9F3EC;
    --color-primary-green-deep: #2B5834;

    --color-text-heading: #1A1A1A;
    --color-text-body: #4B5563;
    --color-text-muted: #8A8F98;

    --color-input-bg: #EDEDED;
    --color-input-bg-hover: #E2E2E2;
    --color-input-placeholder: #8A8A8A;

    --color-card-bg: #FFFFFF;
    --color-page-bg: #F5F6F5;
    --color-border-divider: #E4E4E4;

    --color-sidebar-text: rgba(255, 255, 255, 0.72);
    --color-sidebar-text-active: #FFFFFF;
    --color-sidebar-item-active-bg: rgba(255, 255, 255, 0.12);

    --radius-card: 20px;
    --radius-input: 8px;
    --radius-btn: 8px;
    --radius-avatar: 999px;

    --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.05);

    --font-heading: 'Poppins', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    width: 100%;
  }

  body {
    display: flex;
    background-color: var(--color-page-bg);
    font-family: var(--font-body);
    overflow: hidden;
  }

  /* ===================== SIDEBAR ===================== */
  .sidebar {
    width: 264px;
    min-width: 264px;
    height: 100vh;
    background: linear-gradient(180deg, var(--color-primary-green) 0%, var(--color-primary-green-deep) 100%);
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 8px;
    margin-bottom: 40px;
  }

  .brand-icon {
    width: 40px;
    height: 40px;
    border-radius: 11px;
    background: rgba(255, 255, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .brand-icon svg { width: 22px; height: 22px; }

  .brand-name {
    font-family: var(--font-heading);
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }

  .nav-group-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.45);
    padding: 0 12px;
    margin: 4px 0 10px;
  }

  .nav-list {
    list-style: none;
    margin: 0 0 28px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .nav-item a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: 10px;
    color: var(--color-sidebar-text);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background-color 0.15s ease, color 0.15s ease;
  }

  .nav-item a svg { width: 18px; height: 18px; flex-shrink: 0; }

  .nav-item a:hover {
    background: var(--color-sidebar-item-active-bg);
    color: var(--color-sidebar-text-active);
  }

  .nav-item.active a {
    background: var(--color-sidebar-item-active-bg);
    color: var(--color-sidebar-text-active);
    font-weight: 600;
  }

  .nav-item a .item-badge {
    margin-left: auto;
    background: rgba(255, 255, 255, 0.22);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.12);
  }

  .sidebar-footer a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: 10px;
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }

  .sidebar-footer a svg { width: 18px; height: 18px; }
  .sidebar-footer a:hover { background: var(--color-sidebar-item-active-bg); color: #fff; }

  /* ===================== MAIN CONTENT ===================== */
  .main {
    flex: 1;
    height: 100vh;
    overflow-y: auto;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    background: var(--color-page-bg);
    border-bottom: 1px solid var(--color-border-divider);
  }

  .topbar h1 {
    font-family: var(--font-heading);
    font-size: 22px;
    font-weight: 700;
    color: var(--color-text-heading);
    margin: 0 0 4px;
  }

  .topbar .subtitle {
    font-size: 14px;
    color: var(--color-text-body);
    margin: 0;
  }

  .topbar-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--color-primary-green-light);
    border: 1.5px solid var(--color-primary-green);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-primary-green);
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }

  .content-area {
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 40px 60px;
  }

  /* ===== "Punya kode kupon" banner ===== */
  .redeem-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    background: linear-gradient(120deg, var(--color-primary-green) 0%, var(--color-primary-green-deep) 100%);
    border-radius: var(--radius-card);
    padding: 24px 30px;
    margin-bottom: 26px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  .redeem-banner::after {
    content: "";
    position: absolute;
    right: -30px;
    top: -30px;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
  }

  .redeem-banner-text h2 {
    font-family: var(--font-heading);
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 4px;
  }

  .redeem-banner-text p {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    margin: 0;
  }

  .redeem-form {
    display: flex;
    gap: 10px;
    z-index: 1;
  }

  .redeem-form input {
    width: 220px;
    padding: 12px 16px;
    border-radius: var(--radius-input);
    border: none;
    outline: none;
    font-family: var(--font-body);
    font-size: 13px;
    background: rgba(255, 255, 255, 0.92);
    color: var(--color-text-heading);
  }

  .redeem-form input::placeholder { color: var(--color-input-placeholder); }

  .redeem-form button {
    padding: 12px 22px;
    border-radius: var(--radius-input);
    border: none;
    background: #fff;
    color: var(--color-primary-green-dark);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  .redeem-form button:hover { background: var(--color-primary-green-light); }

  /* ===== Tabs ===== */
  .tab-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--color-border-divider);
  }

  .tab-btn {
    padding: 12px 6px;
    margin-right: 22px;
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text-muted);
    cursor: pointer;
    position: relative;
    top: 1px;
    transition: color 0.15s ease, border-color 0.15s ease;
  }

  .tab-btn:hover { color: var(--color-text-heading); }

  .tab-btn.active {
    color: var(--color-primary-green);
    border-bottom-color: var(--color-primary-green);
  }

  /* ===== Coupon grid ===== */
  .coupon-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }

  .coupon-card {
    display: flex;
    background: var(--color-card-bg);
    border-radius: 16px;
    box-shadow: var(--shadow-card);
    border: 1px solid var(--color-border-divider);
    overflow: hidden;
  }

  .coupon-card.disabled { opacity: 0.55; }

  .coupon-stub {
    width: 90px;
    min-width: 90px;
    background: var(--color-primary-green);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    position: relative;
    padding: 10px 6px;
    text-align: center;
  }

  .coupon-card.disabled .coupon-stub { background: #A6A6A6; }

  .coupon-stub svg { width: 26px; height: 26px; margin-bottom: 6px; opacity: 0.9; }

  .coupon-stub .stub-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* dashed perforation divider using radial gradient */
  .coupon-stub::after {
    content: "";
    position: absolute;
    right: -1px;
    top: 0;
    bottom: 0;
    width: 1px;
    background-image: linear-gradient(var(--color-card-bg) 50%, rgba(0,0,0,0) 0%);
    background-position: right;
    background-size: 2px 10px;
    background-repeat: repeat-y;
  }

  .coupon-body {
    flex: 1;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
  }

  .coupon-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .coupon-title {
    font-family: var(--font-heading);
    font-size: 14.5px;
    font-weight: 700;
    color: var(--color-text-heading);
    margin: 0 0 4px;
  }

  .coupon-desc {
    font-size: 12px;
    color: var(--color-text-body);
    margin: 0;
    line-height: 1.5;
  }

  .coupon-category-tag {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    color: var(--color-primary-green-dark);
    background: var(--color-primary-green-light);
    padding: 4px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .coupon-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: var(--color-text-muted);
    margin-top: 10px;
  }

  .coupon-meta svg { width: 13px; height: 13px; flex-shrink: 0; }

  .coupon-footer {
    margin-top: auto;
    padding-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .coupon-code {
    font-family: 'Poppins', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--color-text-heading);
    background: var(--color-input-bg);
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px dashed var(--color-border-divider);
  }

  .coupon-action-btn {
    padding: 9px 18px;
    border-radius: var(--radius-btn);
    border: none;
    background: var(--color-primary-green);
    color: #fff;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.15s ease;
  }

  .coupon-action-btn:hover { background: var(--color-primary-green-dark); }

  .coupon-action-btn.claimed {
    background: var(--color-input-bg);
    color: var(--color-text-muted);
    cursor: default;
  }

  .coupon-action-btn.disabled {
    background: var(--color-input-bg);
    color: var(--color-text-muted);
    cursor: not-allowed;
  }

  /* ===== Empty state ===== */
  .tab-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 70px 20px;
    color: var(--color-text-muted);
  }

  .tab-empty svg { width: 56px; height: 56px; opacity: 0.4; margin-bottom: 14px; }
  .tab-empty h3 { font-family: var(--font-heading); font-size: 16px; color: var(--color-text-heading); margin: 0 0 4px; }
  .tab-empty p { font-size: 13px; margin: 0; }

  /* ===== Responsive ===== */
  @media (max-width: 1024px) {
    .coupon-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 900px) {
    body { overflow: auto; }
    .sidebar { display: none; }
    .main { height: auto; }
    .redeem-banner { flex-direction: column; align-items: flex-start; }
    .redeem-form { width: 100%; }
    .redeem-form input { flex: 1; width: auto; }
  }

  @media (max-width: 640px) {
    .topbar { padding: 18px 20px; }
    .content-area { padding: 22px 20px 60px; }
  }
</style>
</head>

<script>
  /* ===== Coupon data ===== */
  const coupons = [
    {
      id: 1, code: 'HEMAT20', title: 'Diskon 20% Belanja Sembako', category: 'Sembako',
      desc: 'Potongan 20% untuk semua produk sembako, maksimal potongan Rp15.000.',
      minPurchase: 'Rp50.000', expiry: '31 Jul 2026', status: 'tersedia'
    },
    {
      id: 2, code: 'ONGKIR0', title: 'Gratis Ongkos Kirim', category: 'Ongkir',
      desc: 'Gratis biaya pengiriman untuk semua transaksi tanpa minimum belanja.',
      minPurchase: 'Tanpa minimum', expiry: '20 Jul 2026', status: 'tersedia'
    },
    {
      id: 3, code: 'MINUM10', title: 'Diskon 10% Minuman', category: 'Minuman',
      desc: 'Nikmati potongan 10% untuk semua kategori minuman kemasan.',
      minPurchase: 'Rp25.000', expiry: '15 Ags 2026', status: 'tersedia'
    },
    {
      id: 4, code: 'BARU50K', title: 'Potongan Rp50.000', category: 'Pengguna Baru',
      desc: 'Khusus pengguna baru, potongan langsung Rp50.000 untuk transaksi pertama.',
      minPurchase: 'Rp100.000', expiry: '10 Ags 2026', status: 'tersedia'
    },
    {
      id: 5, code: 'CASHBACK5', title: 'Cashback 5% Poin Belanja', category: 'Cashback',
      desc: 'Dapatkan cashback 5% dalam bentuk poin yang bisa dipakai belanja berikutnya.',
      minPurchase: 'Rp30.000', expiry: '5 Jul 2026', status: 'terpakai'
    },
    {
      id: 6, code: 'WEEKEND15', title: 'Diskon Akhir Pekan 15%', category: 'Umum',
      desc: 'Berlaku setiap akhir pekan untuk seluruh kategori produk.',
      minPurchase: 'Rp40.000', expiry: '30 Jun 2026', status: 'kadaluarsa'
    }
  ];

  const couponIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 9a2 2 0 002-2V6a1 1 0 011-1h10a1 1 0 011 1v1a2 2 0 002 2 2 2 0 010 6 2 2 0 00-2 2v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-1a2 2 0 00-2-2 2 2 0 010-6z"/></svg>`;

  let activeTab = 'tersedia';

  function renderCoupons() {
    const grid = document.getElementById('couponGrid');
    const filtered = coupons.filter(c => c.status === activeTab);

    if (filtered.length === 0) {
      grid.style.display = 'block';
      grid.innerHTML = `
        <div class="tab-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 9a2 2 0 002-2V6a1 1 0 011-1h10a1 1 0 011 1v1a2 2 0 002 2 2 2 0 010 6 2 2 0 00-2 2v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-1a2 2 0 00-2-2 2 2 0 010-6z"/></svg>
          <h3>Belum ada kupon di sini</h3>
          <p>Kupon yang ${activeTab === 'tersedia' ? 'tersedia' : activeTab} akan muncul di tab ini.</p>
        </div>`;
      return;
    }

    grid.style.display = 'grid';
    grid.innerHTML = '';

    filtered.forEach(c => {
      const isDisabled = c.status !== 'tersedia';
      const card = document.createElement('div');
      card.className = 'coupon-card' + (isDisabled ? ' disabled' : '');
      card.innerHTML = `
        <div class="coupon-stub">
          ${couponIcon}
          <span class="stub-label">${c.category}</span>
        </div>
        <div class="coupon-body">
          <div class="coupon-top">
            <div>
              <p class="coupon-title">${c.title}</p>
              <p class="coupon-desc">${c.desc}</p>
            </div>
          </div>
          <div class="coupon-meta">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            Berlaku sampai ${c.expiry} &middot; Min. belanja ${c.minPurchase}
          </div>
          <div class="coupon-footer">
            <span class="coupon-code">${c.code}</span>
            ${
              c.status === 'tersedia'
                ? `<button class="coupon-action-btn" data-id="${c.id}">Pakai Kupon</button>`
                : c.status === 'terpakai'
                  ? `<button class="coupon-action-btn claimed" disabled>Sudah Dipakai</button>`
                  : `<button class="coupon-action-btn disabled" disabled>Kadaluarsa</button>`
            }
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.coupon-action-btn[data-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        alert('Kupon diterapkan ke keranjang belanjamu!');
        window.location.href = 'keranjang.html';
      });
    });
  }

  /* ===== Tabs ===== */
  document.getElementById('tabRow').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    renderCoupons();
  });

  /* ===== Redeem code ===== */
  document.getElementById('redeemBtn').addEventListener('click', () => {
    const code = document.getElementById('redeemInput').value.trim().toUpperCase();
    if (!code) return;
    const found = coupons.find(c => c.code === code);
    if (found && found.status === 'tersedia') {
      alert(`Kupon ${code} berhasil ditambahkan ke akunmu!`);
    } else if (found) {
      alert(`Kupon ${code} sudah tidak dapat digunakan.`);
    } else {
      alert('Kode kupon tidak ditemukan.');
    }
    document.getElementById('redeemInput').value = '';
  });

  /* ===== Init ===== */
  document.getElementById('sidebarCouponBadge').textContent = coupons.filter(c => c.status === 'tersedia').length;
  renderCoupons();
</script>

</body>
</html>
